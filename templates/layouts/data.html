<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }}</title>
    <style>
      :root {
        --bg-color: #0b0f19;
        --card-bg: #111827;
        --text-color: #f3f4f6;
        --text-muted: #9ca3af;
        --border-color: #1f2937;
        --primary-color: #3b82f6;
        --primary-hover: #60a5fa;
        --accent-color: #10b981;
        --zebra-bg: #1f293750;
        --hover-bg: #1f2937a0;
      }
      
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      
      body {
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background-color: var(--bg-color);
        background-image: radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), radial-gradient(at 50% 0%, hsla(225,39%,30%,0.15) 0, transparent 50%);
        color: var(--text-color);
        padding: 2.5rem 1.5rem;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      
      .container {
        width: 100%;
        max-width: 1200px;
        background: var(--card-bg);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.7);
        padding: 2rem;
        margin-bottom: 2rem;
      }
      
      h1 {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 1.5rem;
        color: var(--text-color);
        letter-spacing: -0.025em;
        border-left: 4px solid var(--primary-color);
        padding-left: 0.75rem;
        display: flex;
        align-items: center;
      }
      
      .table-wrapper {
        width: 100%;
        overflow-x: auto;
        border-radius: 8px;
        border: 1px solid var(--border-color);
      }
      
      table {
        width: 100%;
        border-collapse: collapse;
        text-align: left;
        font-size: 0.9rem;
      }
      
      thead {
        background-color: #0b0f19;
        color: var(--text-muted);
        font-weight: 600;
        text-transform: uppercase;
        font-size: 0.75rem;
        letter-spacing: 0.05em;
      }
      
      thead td, thead th {
        padding: 1rem 1.25rem;
        border-bottom: 2px solid var(--border-color);
      }
      
      tbody tr {
        border-bottom: 1px solid var(--border-color);
        transition: background-color 0.15s ease;
      }
      
      tbody tr:last-child {
        border-bottom: none;
      }
      
      tbody tr:nth-child(even) {
        background-color: var(--zebra-bg);
      }
      
      tbody tr:hover {
        background-color: var(--hover-bg);
      }
      
      tbody td {
        padding: 1rem 1.25rem;
        color: #e5e7eb;
      }
      
      /* Style tables rendered from pandas to_html */
      table.dataframe {
        border: none;
      }
      table.dataframe tr {
        border-bottom: 1px solid var(--border-color);
      }
      table.dataframe th {
        background-color: #0b0f19;
        color: var(--text-muted);
        padding: 1rem 1.25rem;
        font-weight: 600;
        font-size: 0.75rem;
        text-transform: uppercase;
        border-bottom: 2px solid var(--border-color);
      }
      table.dataframe td {
        padding: 1rem 1.25rem;
      }
      
      a {
        color: var(--primary-color);
        text-decoration: none;
        transition: color 0.15s ease;
      }
      
      a:hover {
        color: var(--primary-hover);
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>{{ title }}</h1>
      <div class="table-wrapper">
        {{ content | safe }}
      </div>
    </div>
  </body>
</html>
