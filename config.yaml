# Paths Configuration (previously config/paths.yaml)
paths:
  templates: templates        # Jinja2 템플릿 디렉토리
  data: output/data          # JSON 데이터 원본
  source: output             # 스크립트 생성 HTML (복사 소스)
  output: public             # 최종 빌드 결과 (GitHub Pages 배포)
  output_subdir: dist        # output 내부 서브디렉토리 (URL 유지용: /dist/...)

# Pages Configuration (previously config/pages.yaml)
pages:
  - name: CompanyList
    title: "Company List Table"
    data_file: companylist.json
    data_key: Co  # JSON의 키 (없으면 전체 데이터)
    template: table  # table 또는 json
    columns:
      - key: cd
        label: TICKER
      - key: nm
        label: NAME
      - key: gb
        label: GROUP

  - name: misc
    title: "Miscellaneous Data Table"
    data_file: misc.json
    template: table
    columns:
      - key: key
        label: Key
      - key: value
        label: Value

# Constants and Application settings (previously in core/cons.py)
constants:
  delta_months: 61  # 5년 * 12 + 1 (5년 + buffer)
  PRICE_EMA_SPAN: 3        # 일별 가격 평활화용 EMA span
  RECENT_DAYS_COUNT: 300   # 최근 N일 데이터 저장 파일(raw-300, ema3-300)용

  # Financial Model Parameters
  MA_SHORT_WINDOW: 5       # 단기 이동평균선 범위 (일)
  MA_LONG_WINDOW: 200      # 장기 이동평균선 범위 (일)

  # Alarm & Warning Parameters
  SIGMA_THRESHOLD: 2.5     # 가격 상태 알림 sigma 임계값
  SUCCESS_RATE_WARNING_THRESHOLD: 0.5  # 신규 다운로드 성공률 경고 기준

  # Crawler Performance Controls
  MAX_WORKER_THREADS: 20   # 병렬 다운로드 최대 스레드 수

  # Analytical Scope
  MISC_HISTORY_YEARS: 5    # 기타 통계 데이터 수집 대상 년수

  # System Logic Constants
  MSG_SEPARATOR_WIDTH: 20   # 텔레그램 알림 메시지 구분선 너비
  MIN_DATA_POINTS: 30       # 야후 파이낸스 데이터 유효성 하한선 ( fallback 판단 기준 )
  WEEKS_PER_YEAR: 52        # 연간 주차 수

  # ECOS API 검색 범위
  ECOS_DAILY_FORWARD_DAYS: 5     # 일별 검색 종료일 여유 (일)
  ECOS_DAILY_BACKWARD_DAYS: 400  # 일별 검색 시작일 여유 (일)
  ECOS_MONTHLY_FORWARD_DAYS: 30  # 월별 검색 종료일 여유 (일)
  ECOS_DATA_START_MONTH: "200301"  # 월별 ECOS 데이터 수집 시작 년월

